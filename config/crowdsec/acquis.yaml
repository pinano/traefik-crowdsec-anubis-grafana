# --- Docker Containers Surveillance (stdout) ---
# Block 1: Traefik
source: docker
container_name_regexp:
 - ".*traefik.*"
labels:
  type: traefik

---

# --- SFTP Container Surveillance (stdout) ---
# Block 2: SFTP (Sidecar)
source: docker
container_name_regexp:
 - ".*sftp.*"
labels:
  type: syslog

## NOTE: THE SEPARATOR --- IS REQUIRED BETWEEN THE TWO BLOCKS
## NOTE: Do NOT add AppSec config here. It is appended by start.sh when CROWDSEC_APPSEC_ENABLE=true.

---

# --- AppSec (WAF) Configuration --- (auto-generated by start.sh)
appsec_configs:
  - crowdsecurity/appsec-default
labels:
  type: appsec
listen_addr: 0.0.0.0:7422
source: appsec
name: traefikAppSec

apiVersion: 1

contactPoints:
  - orgId: 1
    name: Telegram
    receivers:
      - uid: telegram-main
        type: telegram
        settings:
          # These values are injected from Docker environment variables.
          # See docker-compose-grafana-loki-alloy-prometheus.yaml
          bottoken: "$GRAFANA_TELEGRAM_BOT_TOKEN"
          chatid: "$GRAFANA_TELEGRAM_CHAT_ID"
          # Message format: HTML allows bold/italic for readability
          parse_mode: "HTML"
          # Include a link to the Grafana alert panel
          disable_web_page_preview: true
          # Message template: brief and actionable
          message: |
            {{ if eq .Status "firing" }}🔴{{ else }}✅{{ end }} <b>{{ .CommonLabels.alertname }}</b>

            {{ range .Alerts }}
            {{- if eq .Status "firing" }}🔥 <b>FIRING</b>{{ else }}✅ <b>RESOLVED</b>{{ end }}
            📌 <b>Severity:</b> {{ .Labels.severity }}
            📝 {{ .Annotations.summary }}
            {{ if .Annotations.description }}💬 {{ .Annotations.description }}{{ end }}
            ⏰ {{ if eq .Status "firing" }}Since: {{ .StartsAt | since }}{{ else }}Duration: {{ .StartsAt | since }}{{ end }}
            {{ end }}
        disableResolveMessage: false

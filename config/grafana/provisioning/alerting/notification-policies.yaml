apiVersion: 1

policies:
  - orgId: 1
    receiver: Telegram
    # Default: group all alerts firing at the same time, wait 30s before sending,
    # then send a summary every 5 minutes if still firing.
    group_by:
      - alertname
      - severity
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      # Critical alerts: faster repeat, no grouping delay
      - receiver: Telegram
        matchers:
          - severity = critical
        group_wait: 10s
        group_interval: 2m
        repeat_interval: 1h

      # Warning alerts: standard cadence
      - receiver: Telegram
        matchers:
          - severity = warning
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
